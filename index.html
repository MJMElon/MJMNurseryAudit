<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f2e0f" />
  <title>MJM Nursery — Audit System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --g900: #0a1f0a; --g800: #1a4d1a; --g700: #236023;
      --g600: #2d7a2d; --g500: #3d9c3d; --g400: #5aab5a;
      --g300: #81c784; --g200: #b5dfb5; --g100: #e0f2e0;
    }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--g900); color: #fff; -webkit-font-smoothing: antialiased; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(circle at 20% 20%, rgba(45,122,45,0.25) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(26,77,26,0.3) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.25rem; }
    .brand { text-align: center; margin-bottom: 2.5rem; animation: fadeDown 0.6s ease both; }
    .brand-icon { width: 72px; height: 72px; border-radius: 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .brand-icon svg { width: 38px; height: 38px; stroke: var(--g300); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .brand-name { font-family: 'DM Serif Display', serif; font-size: 28px; color: #fff; margin-bottom: 6px; }
    .brand-name span { color: var(--g300); }
    .brand-sub { font-size: 13px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.5px; }
    .login-card { width: 100%; max-width: 400px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 2rem 1.75rem; backdrop-filter: blur(12px); animation: fadeUp 0.6s 0.1s ease both; }
    .login-heading { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 1.75rem; }
    .field { margin-bottom: 1rem; }
    .field-label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); margin-bottom: 7px; display: block; text-transform: uppercase; letter-spacing: 0.3px; }
    .field-input-wrap { position: relative; }
    .field-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); pointer-events: none; }
    .field-icon svg { width: 16px; height: 16px; stroke: rgba(255,255,255,0.35); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .field-input { width: 100%; height: 46px; padding: 0 42px 0 40px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; color: #fff; outline: none; transition: all 0.2s; -webkit-appearance: none; }
    .field-input::placeholder { color: rgba(255,255,255,0.25); }
    .field-input:focus { border-color: var(--g400); background: rgba(255,255,255,0.1); box-shadow: 0 0 0 3px rgba(90,171,90,0.2); }
    .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 4px; cursor: pointer; }
    .pw-toggle svg { width: 16px; height: 16px; stroke: rgba(255,255,255,0.3); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.15s; }
    .pw-toggle:hover svg { stroke: rgba(255,255,255,0.65); }
    .error-msg { display: none; background: rgba(185,28,28,0.2); border: 1px solid rgba(252,165,165,0.3); border-radius: 8px; padding: 10px 13px; font-size: 13px; color: #fca5a5; margin-bottom: 1rem; animation: shake 0.35s ease; }
    .error-msg.show { display: block; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
    .btn-login { width: 100%; height: 48px; border-radius: 12px; background: var(--g600); border: none; color: #fff; font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.18s; box-shadow: 0 4px 16px rgba(45,122,45,0.4); margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-login:hover { background: var(--g500); }
    .btn-login:active { transform: scale(0.98); }
    .btn-login svg { width: 17px; height: 17px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .btn-login.loading { pointer-events: none; opacity: 0.8; }
    .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text, .btn-login.loading .btn-icon { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .demo-hint { margin-top: 1.25rem; text-align: center; font-size: 12px; color: rgba(255,255,255,0.28); }
    .demo-hint strong { color: rgba(255,255,255,0.45); }
    .login-footer { margin-top: 2rem; font-size: 11px; color: rgba(255,255,255,0.2); text-align: center; animation: fadeUp 0.6s 0.3s ease both; }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div class="page">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 22V12"/><path d="M12 12C12 12 7 10 5 6c3 0 6 2 7 6z"/>
        <path d="M12 12C12 12 17 10 19 6c-3 0-6 2-7 6z"/>
        <path d="M12 12C12 12 8 14 7 18c2.5-0.5 4.5-2.5 5-6z"/>
        <path d="M12 12C12 12 16 14 17 18c-2.5-0.5-4.5-2.5-5-6z"/>
      </svg>
    </div>
    <div class="brand-name">MJM <span>Nursery</span></div>
    <div class="brand-sub">Mega Jutamas Sdn Bhd</div>
  </div>

  <div class="login-card">
    <div class="login-heading">Welcome back</div>
    <div class="login-sub">Sign in to access the Audit System</div>
    <div class="error-msg" id="error-msg">Incorrect username or password.</div>

    <div class="field">
      <label class="field-label" for="username">Username</label>
      <div class="field-input-wrap">
        <div class="field-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <input class="field-input" id="username" type="text" placeholder="Enter your username" autocomplete="username" autocapitalize="none" onkeydown="if(event.key==='Enter') document.getElementById('password').focus()" />
      </div>
    </div>

    <div class="field">
      <label class="field-label" for="password">Password</label>
      <div class="field-input-wrap">
        <div class="field-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
        <input class="field-input" id="password" type="password" placeholder="Enter your password" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()" />
        <button class="pw-toggle" type="button" onclick="togglePw()">
          <svg id="pw-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">
      <div class="spinner"></div>
      <svg class="btn-icon" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      <span class="btn-text">Sign In</span>
    </button>

    <div class="demo-hint">username <strong>admin</strong> &nbsp;/&nbsp; password <strong>mjm2025</strong></div>
  </div>
  <div class="login-footer">© 2025 Mega Jutamas Sdn Bhd · Miri, Sarawak</div>
</div>

<script src="supabase.js"></script>
<script>
  // Skip login if already logged in
  if (localStorage.getItem('mjm_user')) window.location.href = 'home.html';

  function togglePw() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('pw-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      input.type = 'password';
      icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('error-msg');
    const btn      = document.getElementById('btn-login');

    errEl.classList.remove('show');
    if (!username || !password) {
      errEl.textContent = 'Please enter your username and password.';
      errEl.classList.add('show'); return;
    }

    btn.classList.add('loading');
    try {
      // Query users table in Supabase
      const rows = await sb.select('users', `username=eq.${username}&password=eq.${password}&select=id,username,name,role`);
      if (rows && rows.length > 0) {
        const user = rows[0];
        localStorage.setItem('mjm_user', JSON.stringify({ id: user.id, name: user.name, role: user.role, username: user.username }));
        window.location.href = 'home.html';
      } else {
        btn.classList.remove('loading');
        errEl.textContent = 'Incorrect username or password. Please try again.';
        errEl.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    } catch (e) {
      btn.classList.remove('loading');
      errEl.textContent = 'Connection error. Please check your internet and try again.';
      errEl.classList.add('show');
      console.error(e);
    }
  }
</script>
</body>
</html>
